version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: noctryx_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: noctryx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - noctryx_network

  app:
    build: .
    container_name: noctryx_app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://user:password@db:5432/noctryx?schema=public"
      NEXTAUTH_SECRET: "your-super-secret-nextauth-string"
      NEXTAUTH_URL: "http://localhost:3000"
      OPENAI_API_KEY: "your-openai-api-key"
    depends_on:
      - db
    networks:
      - noctryx_network

networks:
  noctryx_network:
    driver: bridge

volumes:
  postgres_data:
